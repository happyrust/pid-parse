[package]
name = "pid-parse"
version = "0.1.0"
edition = "2021"
description = "Layered parser for SmartPlant / Smart P&ID .pid files"
license = "MIT OR Apache-2.0"

[dependencies]
cfb = "0.10"
quick-xml = { version = "0.38", features = ["serialize"] }
serde = { version = "1", features = ["derive"] }
thiserror = "2"
encoding_rs = "0.8"
uuid = { version = "1", features = ["serde"] }
time = { version = "0.3", features = ["formatting", "parsing", "serde"] }

[dev-dependencies]
pretty_assertions = "1"
