name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # Fast feedback: build + unit/module tests with no real `.pid` fixtures.
  # `test-file/` is gitignored, so these jobs run the full offline suite
  # (unit tests + integration tests with memory CFB fixtures).
  test:
    name: test (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: cargo build (workspace)
        # --workspace also builds the vendored `oxidized-mdf` crate so any
        # breakage in the GPL-3.0 parser is caught in the same job.
        run: cargo build --locked --workspace --all-targets

      - name: cargo test (offline suite, workspace)
        # Real `.pid` fixtures live in `test-file/` and are gitignored,
        # so the real-file tests gracefully skip when the directory is
        # absent — see `writer_real_files.rs` / `parse_real_files.rs`.
        # --workspace picks up vendored oxidized-mdf unit tests too.
        run: cargo test --locked --workspace --all-targets

      - name: cargo build --examples
        # Examples under `examples/` double as living regression tests
        # for the public API surface advertised in the crate-level
        # rustdoc. `cargo build --all-targets` above already covered
        # them, but we keep an explicit step so CI failures point
        # clearly at the examples layer (compared to library build
        # failures further up). Runtime is near-zero because `build
        # --all-targets` warmed the cache.
        run: cargo build --locked --examples

      - name: cargo clippy (workspace, fail on any warning)
        # --workspace makes the vendored crate a hard gate alongside the
        # parent crate; -D warnings keeps the bar at zero.
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: cargo fmt (check)
        # Phase 9i onwards: hard-fail on any drift. Run `cargo fmt --all`
        # locally before pushing, or let your editor handle it.
        run: cargo fmt --all -- --check

      - name: missing_docs ratchet
        # Reject PRs that add undocumented `pub` items. The baseline in
        # `.github/missing-docs-baseline.txt` is intentionally
        # ratchet-down only: reducing the count requires editing the
        # file in the same PR, which keeps the progress visible in git
        # history. See `AGENTS.md` for the runbook.
        run: bash .github/scripts/check-missing-docs.sh

  # Independent gate: scan Cargo.lock for known security advisories
  # (RUSTSEC database). Runs in parallel with `test` so a new CVE
  # surfacing in a transitive dependency fails CI without waiting for
  # the full build/test matrix. `taiki-e/install-action` pulls a
  # pre-built `cargo-audit` binary so the job stays fast (<10 s on
  # warm cache) — no need to compile cargo-audit from source.
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        # `--locked` makes the gate fail if Cargo.lock drifts from the
        # checked-in version (otherwise audit could mask issues by
        # updating the lockfile in-place).
        run: cargo audit --locked
