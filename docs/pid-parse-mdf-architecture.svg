  <text x="480" y="286" text-anchor="middle" font-size="11" fill="#b45309">PageHeader | slot directory | Record envelope | VariableColumns cursor</text>
  <line x1="480" y1="300" x2="480" y2="328" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="80" y="328" width="380" height="72" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
