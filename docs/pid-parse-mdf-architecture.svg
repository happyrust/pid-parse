  <text x="680" y="556" text-anchor="middle" font-size="11" fill="#4338ca">Iterator&lt;Item = Row&gt; | sync API</text>
  <path d="M 400,554 C 440,554 440,544 520,544" stroke="#059669" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <rect x="418" y="540" width="64" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="450" y="552" text-anchor="middle" font-size="10" fill="#059669">metadata</text>
