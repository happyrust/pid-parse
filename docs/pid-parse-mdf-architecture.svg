  <text x="270" y="368" text-anchor="middle" font-size="11" fill="#047857">from_le_bytes: i8/i16/i32/i64/f32/f64/u128</text>
  <text x="270" y="384" text-anchor="middle" font-size="11" fill="#047857">decimal | datetime | smalldatetime | date | uuid</text>
