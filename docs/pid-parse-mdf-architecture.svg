  <text x="690" y="368" text-anchor="middle" font-size="11" fill="#9d174d">nvarchar | varchar | sysname | text | ntext</text>
  <text x="690" y="384" text-anchor="middle" font-size="11" fill="#9d174d">varbinary | image | binary | Result propagation</text>
