  <rect x="600" y="884" width="160" height="28" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="680" y="903" text-anchor="middle" font-size="12" font-weight="bold" fill="#064e3b">_Meta.xml</text>
