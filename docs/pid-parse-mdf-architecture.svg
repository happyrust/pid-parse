  <line x1="680" y1="676" x2="480" y2="728" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="320" y="728" width="320" height="52" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="750" text-anchor="middle" font-size="13" font-weight="bold" fill="#0c4a6e">sqlite_load.rs</text>
  <text x="480" y="766" text-anchor="middle" font-size="11" fill="#0369a1">SQL queries &#x2192; PublishDrawing DTO</text>
  <line x1="480" y1="780" x2="480" y2="808" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="320" y="808" width="320" height="52" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="830" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">xml_writer.rs</text>
  <text x="480" y="846" text-anchor="middle" font-size="11" fill="#b45309">DTO &#x2192; _Data.xml + _Meta.xml</text>
  <line x1="400" y1="860" x2="300" y2="886" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="860" x2="660" y2="886" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="200" y="884" width="160" height="28" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
