  </defs>
  <rect width="960" height="920" fill="#ffffff"/>
  <text x="480" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">pid-parse MDF Publish Pipeline Architecture</text>
  <rect x="360" y="56" width="240" height="48" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a5f">Export.mdf</text>
  <line x1="480" y1="104" x2="480" y2="136" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
