  <text x="60" y="156" font-size="12" fill="#64748b" font-style="italic">vendor/oxidized-mdf (GPL-3.0, sync, panic-free, nom 8)</text>
  <rect x="320" y="168" width="320" height="52" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#312e81">PageReader</text>
