  <text x="108" y="796" font-size="10" fill="#475569">Metadata feed</text>
  <rect x="70" y="804" width="30" height="10" rx="2" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="108" y="814" font-size="10" fill="#475569">Module boundary</text>
