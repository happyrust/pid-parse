  <text x="240" y="576" text-anchor="middle" font-size="11" fill="#c2410c">syscolpar | sysscalartype</text>
  <rect x="520" y="520" width="320" height="48" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5" filter="url(#shadow)"/>
