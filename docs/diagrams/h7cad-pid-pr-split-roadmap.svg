<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" width="1200" height="740">
  <style>
    text { font-family: Helvetica, Arial, sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .node-title { font-size: 15px; font-weight: 700; fill: #111827; }
    .node-sub { font-size: 12px; fill: #4b5563; }
    .small { font-size: 11px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="740" fill="#ffffff"/>
  <text x="60" y="48" class="title">H7CAD PID PR Split Roadmap</text>
  <text x="60" y="72" class="subtitle">PR1-PR6 split for reviewable, evidence-gated delivery. No endpoint line or text promotion without source-proven mapping.</text>

  <rect x="40" y="105" width="1120" height="170" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="60" y="132" class="node-title">Delivery path</text>
  <g filter="url(#shadow)">
    <rect x="80" y="160" width="230" height="76" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="195" y="188" text-anchor="middle" class="node-title">PR1 Contract</text>
    <text x="195" y="209" text-anchor="middle" class="node-sub">NormalizedPidGeometry</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="390" y="160" width="230" height="76" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="505" y="188" text-anchor="middle" class="node-title">PR2 H7CAD Points</text>
    <text x="505" y="209" text-anchor="middle" class="node-sub">render Inferred Point only</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="700" y="160" width="230" height="76" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
    <text x="815" y="188" text-anchor="middle" class="node-title">PR3 Guardrails</text>
    <text x="815" y="209" text-anchor="middle" class="node-sub">object_geometry_hints = 0</text>
  </g>
  <path d="M 310 198 L 390 198" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 620 198 L 700 198" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <g filter="url(#shadow)">
    <path d="M 1030 155 L 1110 198 L 1030 241 L 950 198 Z" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
    <text x="1030" y="191" text-anchor="middle" class="node-title">No Line</text>
    <text x="1030" y="212" text-anchor="middle" class="node-sub">until proven</text>
  </g>
  <path d="M 930 198 L 950 198" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>

  <rect x="40" y="315" width="1120" height="255" rx="14" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="60" y="342" class="node-title">Investigation path</text>
  <g filter="url(#shadow)">
    <rect x="80" y="375" width="230" height="92" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="195" y="403" text-anchor="middle" class="node-title">PR4 Field-X</text>
    <text x="195" y="424" text-anchor="middle" class="node-sub">windows + features</text>
    <text x="195" y="444" text-anchor="middle" class="node-sub">max_score=45</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="390" y="375" width="230" height="92" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="505" y="403" text-anchor="middle" class="node-title">PR5 Identity</text>
    <text x="505" y="424" text-anchor="middle" class="node-sub">same_object=11</text>
    <text x="505" y="444" text-anchor="middle" class="node-sub">over_threshold=0</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="700" y="375" width="230" height="92" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="815" y="403" text-anchor="middle" class="node-title">PR6 Text Placement</text>
    <text x="815" y="424" text-anchor="middle" class="node-sub">text_quality=0</text>
    <text x="815" y="444" text-anchor="middle" class="node-sub">over_threshold=0</text>
  </g>
  <path d="M 310 421 L 390 421" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 620 421 L 700 421" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <g filter="url(#shadow)">
    <rect x="960" y="375" width="150" height="92" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
    <text x="1035" y="403" text-anchor="middle" class="node-title">Report Only</text>
    <text x="1035" y="424" text-anchor="middle" class="node-sub">no DTO fill</text>
    <text x="1035" y="444" text-anchor="middle" class="node-sub">no H7CAD change</text>
  </g>
  <path d="M 930 421 L 960 421" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>

  <rect x="40" y="610" width="1120" height="76" rx="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="60" y="638" class="node-title">Execution rule</text>
  <text x="200" y="638" class="small">Manual hunk split required for src/parsers/sheet_probe.rs and tests/parse_real_files.rs</text>
  <text x="60" y="662" class="node-sub">Only create staging, branches, commits, or PRs after explicit user authorization.</text>

  <g transform="translate(60, 710)">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="42" y="4" class="small">delivery dependency</text>
    <line x1="220" y1="0" x2="254" y2="0" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <text x="262" y="4" class="small">investigation sequence</text>
    <line x1="470" y1="0" x2="504" y2="0" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
    <text x="512" y="4" class="small">no-promotion gate</text>
  </g>
</svg>
