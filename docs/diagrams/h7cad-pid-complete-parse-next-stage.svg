<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'Microsoft YaHei', sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .box-title { font-size: 15px; font-weight: 700; fill: #111827; }
    .box-text { font-size: 12px; fill: #4b5563; }
    .small { font-size: 11px; fill: #6b7280; }
    .gate { font-size: 12px; font-weight: 700; fill: #991b1b; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#d1d5db" flood-opacity="0.7"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="48" y="48" class="title">H7CAD PID 完整解析推进路线</text>
  <text x="48" y="72" class="subtitle">目标：从 ProbeOnly / Inferred Point 推进到可证明的 Line / Text / Symbol 显示。</text>

  <g transform="translate(48 112)">
    <rect x="0" y="0" width="250" height="112" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="18" y="28" class="box-title">当前基线</text>
    <text x="18" y="52" class="box-text">可安全显示 Inferred Point</text>
    <text x="18" y="72" class="box-text">object_geometry_hints = 0</text>
    <text x="18" y="92" class="box-text">Shape classifier v1 已落地</text>
  </g>

  <g transform="translate(350 112)">
    <rect x="0" y="0" width="250" height="112" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="18" y="28" class="box-title">8A Fixture 扩容</text>
    <text x="18" y="52" class="box-text">当前 5 个 fixture 已入库</text>
    <text x="18" y="72" class="box-text">已输出 fixture/sheet 明细</text>
    <text x="18" y="92" class="box-text">下一步扩到 8-12 个</text>
  </g>

  <g transform="translate(652 112)">
    <rect x="0" y="0" width="250" height="112" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="18" y="28" class="box-title">8B Sheet 语法</text>
    <text x="18" y="52" class="box-text">record dump 已完成</text>
    <text x="18" y="72" class="box-text">record shape classifier v1</text>
    <text x="18" y="92" class="box-text">坐标字段边界待证明</text>
  </g>

  <g transform="translate(954 112)">
    <rect x="0" y="0" width="198" height="112" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="18" y="28" class="box-title">Promotion Gate</text>
    <text x="18" y="52" class="box-text">对象身份 + 结构</text>
    <text x="18" y="72" class="box-text">+ 坐标字段 offset</text>
    <text x="18" y="92" class="box-text">+ 多样本重复证明</text>
  </g>

  <path d="M298 168 H340" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M600 168 H642" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M902 168 H944" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrow-blue)"/>

  <g transform="translate(120 300)">
    <rect x="0" y="0" width="260" height="150" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="18" y="30" class="box-title">证据输入</text>
    <text x="18" y="58" class="box-text">field_x windows</text>
    <text x="18" y="80" class="box-text">GraphicIdentityNearby</text>
    <text x="18" y="102" class="box-text">text window candidates</text>
    <text x="18" y="124" class="box-text">coordinate quality hints</text>
  </g>

  <g transform="translate(470 300)">
    <polygon points="130,0 260,75 130,150 0,75" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="76" y="58" class="gate">Source-Proven?</text>
    <text x="58" y="82" class="small">禁止降低阈值</text>
    <text x="43" y="104" class="small">禁止 endpoint 当 CAD line</text>
  </g>

  <g transform="translate(840 300)">
    <rect x="0" y="0" width="260" height="150" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
    <text x="18" y="30" class="box-title">H7CAD 渲染</text>
    <text x="18" y="58" class="box-text">Line evidence layer</text>
    <text x="18" y="80" class="box-text">Text evidence layer</text>
    <text x="18" y="102" class="box-text">Symbol anchor layer</text>
    <text x="18" y="124" class="box-text">始终保留 provenance</text>
  </g>

  <path d="M380 375 H460" stroke="#16a34a" stroke-width="2.2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M730 375 H830" stroke="#16a34a" stroke-width="2.2" fill="none" marker-end="url(#arrow-green)"/>

  <path d="M600 450 C600 520 250 520 250 462" stroke="#dc2626" stroke-width="2" fill="none" stroke-dasharray="6 5" marker-end="url(#arrow-red)"/>
  <text x="358" y="540" class="small">Gate 失败：保持 ProbeOnly，继续扩 fixture 并反推 Sheet grammar</text>

  <g transform="translate(70 610)">
    <rect x="0" y="0" width="1060" height="88" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.2"/>
    <text x="18" y="28" class="box-title">当前多 fixture 基线</text>
    <text x="18" y="54" class="box-text">fixtures=5, sheets=3, record_shape_classes=328, identity_over_threshold=0, text_over_threshold=0</text>
    <text x="18" y="74" class="box-text">结论：top shapes support≤4；仍需 source-proven gate 达标后才能 promotion。</text>
  </g>

  <g transform="translate(48 724)">
    <line x1="0" y1="8" x2="30" y2="8" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
    <text x="38" y="12" class="small">计划推进</text>
    <line x1="190" y1="8" x2="220" y2="8" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
    <text x="228" y="12" class="small">promotion 路径</text>
    <line x1="355" y1="8" x2="385" y2="8" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow-red)"/>
    <text x="393" y="12" class="small">gate 失败反馈</text>
  </g>
</svg>
