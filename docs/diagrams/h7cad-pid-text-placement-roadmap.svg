<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <style>
    text { font-family: Helvetica, Arial, sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .node-title { font-size: 15px; font-weight: 700; fill: #111827; }
    .node-sub { font-size: 12px; fill: #4b5563; }
    .small { font-size: 11px; fill: #6b7280; }
    .label { font-size: 12px; fill: #374151; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="#ffffff"/>
  <text x="60" y="48" class="title">H7CAD PID Text Placement Roadmap</text>
  <text x="60" y="72" class="subtitle">Goal: investigate Text + Inferred before any endpoint line promotion. Current Sheet6 result: no promotion.</text>

  <rect x="40" y="105" width="1120" height="170" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="60" y="132" class="node-title">Phase A: Candidate report</text>
  <g filter="url(#shadow)">
    <rect x="75" y="160" width="190" height="76" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="170" y="188" text-anchor="middle" class="node-title">Sheet Text Runs</text>
    <text x="170" y="209" text-anchor="middle" class="node-sub">offset + encoding + value</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="330" y="160" width="205" height="76" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="432" y="188" text-anchor="middle" class="node-title">Coordinate Hints</text>
    <text x="432" y="209" text-anchor="middle" class="node-sub">nearby x/y candidates</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="600" y="160" width="215" height="76" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="708" y="188" text-anchor="middle" class="node-title">Text Window Candidate</text>
    <text x="708" y="209" text-anchor="middle" class="node-sub">same chunk + distance</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="880" y="160" width="210" height="76" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="985" y="188" text-anchor="middle" class="node-title">Report Only</text>
    <text x="985" y="209" text-anchor="middle" class="node-sub">no DTO promotion</text>
  </g>
  <path d="M 265 198 L 330 198" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 535 198 L 600 198" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 815 198 L 880 198" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>

  <rect x="40" y="310" width="1120" height="230" rx="14" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="60" y="337" class="node-title">Phase B: Quality filter and scoring</text>
  <g filter="url(#shadow)">
    <rect x="75" y="365" width="220" height="88" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="185" y="393" text-anchor="middle" class="node-title">Text Quality Filter</text>
    <text x="185" y="414" text-anchor="middle" class="node-sub">accept ASCII tag signal</text>
    <text x="185" y="433" text-anchor="middle" class="node-sub">reject Hangul noise</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="355" y="365" width="220" height="88" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="465" y="393" text-anchor="middle" class="node-title">Coordinate Filter</text>
    <text x="465" y="414" text-anchor="middle" class="node-sub">high quality x/y only</text>
    <text x="465" y="433" text-anchor="middle" class="node-sub">no structural pairs</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="635" y="365" width="220" height="88" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="745" y="393" text-anchor="middle" class="node-title">Score Candidate</text>
    <text x="745" y="414" text-anchor="middle" class="node-sub">same chunk + nearby</text>
    <text x="745" y="433" text-anchor="middle" class="node-sub">repeated delta support</text>
  </g>
  <g filter="url(#shadow)">
    <path d="M 1000 360 L 1080 410 L 1000 460 L 920 410 Z" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
    <text x="1000" y="403" text-anchor="middle" class="node-title">Score >= 70?</text>
    <text x="1000" y="424" text-anchor="middle" class="node-sub">promotion gate</text>
  </g>
  <path d="M 295 409 L 355 409" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 575 409 L 635 409" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 855 409 L 920 409" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>

  <rect x="40" y="570" width="1120" height="95" rx="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="60" y="598" class="node-title">Current Sheet6 result</text>
  <text x="260" y="598" class="small">text_runs=9</text>
  <text x="380" y="598" class="small">candidates=121</text>
  <text x="525" y="598" class="small">same_chunk=25</text>
  <text x="675" y="598" class="small">coord_quality=2</text>
  <text x="840" y="598" class="small">text_quality=0</text>
  <text x="990" y="598" class="small">over_threshold=0</text>
  <path d="M 1000 460 C 1000 520 930 555 830 590" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>
  <text x="60" y="632" class="node-sub">Decision: keep text as ProbeOnly Unknown. Continue only with better text extraction or another real fixture.</text>
  <text x="60" y="650" class="node-sub">PR boundary: PR6 Text Placement Investigation; future PR7 contract and PR8 H7CAD text rendering only after source-proven evidence.</text>

  <g transform="translate(60, 690)">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="42" y="4" class="small">candidate flow</text>
    <line x1="190" y1="0" x2="224" y2="0" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <text x="232" y="4" class="small">scoring flow</text>
    <line x1="380" y1="0" x2="414" y2="0" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
    <text x="422" y="4" class="small">no-promotion result</text>
  </g>
</svg>
