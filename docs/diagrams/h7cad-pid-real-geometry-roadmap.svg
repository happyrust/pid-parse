<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <style>
    text { font-family: Helvetica, Arial, sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .node-title { font-size: 15px; font-weight: 700; fill: #111827; }
    .node-sub { font-size: 12px; fill: #4b5563; }
    .small { font-size: 11px; fill: #6b7280; }
    .label { font-size: 12px; fill: #374151; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="60" y="48" class="title">H7CAD PID Real Geometry Roadmap</text>
  <text x="60" y="72" class="subtitle">Rule: render only source-proven or inferred evidence. Do not turn endpoint or topology links into CAD lines.</text>
  <rect x="40" y="105" width="1120" height="150" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="60" y="132" class="node-title">Delivered display path</text>
  <g filter="url(#shadow)">
    <rect x="70" y="155" width="170" height="72" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="155" y="183" text-anchor="middle" class="node-title">PID File</text>
    <text x="155" y="204" text-anchor="middle" class="node-sub">CFB / Sheet streams</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="300" y="155" width="190" height="72" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="395" y="183" text-anchor="middle" class="node-title">pid-parse</text>
    <text x="395" y="204" text-anchor="middle" class="node-sub">SheetGeometry DTO</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="550" y="155" width="210" height="72" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="655" y="183" text-anchor="middle" class="node-title">NormalizedPidGeometry</text>
    <text x="655" y="204" text-anchor="middle" class="node-sub">Point + ProbeOnly</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="825" y="155" width="230" height="72" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="940" y="183" text-anchor="middle" class="node-title">H7CAD Display</text>
    <text x="940" y="204" text-anchor="middle" class="node-sub">Inferred points only</text>
  </g>
  <path d="M 240 191 L 300 191" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 490 191 L 550 191" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 760 191 L 825 191" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="40" y="295" width="1120" height="280" rx="14" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="60" y="322" class="node-title">Evidence investigation and promotion gate</text>
  <g filter="url(#shadow)">
    <rect x="70" y="350" width="190" height="78" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="165" y="378" text-anchor="middle" class="node-title">Field-X Windows</text>
    <text x="165" y="399" text-anchor="middle" class="node-sub">endpoint/object ids</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="315" y="350" width="210" height="78" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="420" y="378" text-anchor="middle" class="node-title">Record Shape</text>
    <text x="420" y="399" text-anchor="middle" class="node-sub">chunk / marker / delta</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="580" y="350" width="210" height="78" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="685" y="378" text-anchor="middle" class="node-title">Coordinate Filter</text>
    <text x="685" y="399" text-anchor="middle" class="node-sub">remove structural pairs</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="845" y="350" width="230" height="78" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="960" y="378" text-anchor="middle" class="node-title">GraphicIdentityNearby</text>
    <text x="960" y="399" text-anchor="middle" class="node-sub">same-object identity</text>
  </g>
  <path d="M 260 389 L 315 389" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 525 389 L 580 389" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 790 389 L 845 389" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <g filter="url(#shadow)">
    <path d="M 560 475 L 620 435 L 680 475 L 620 515 Z" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
    <text x="620" y="469" text-anchor="middle" class="node-title">Promotion?</text>
    <text x="620" y="490" text-anchor="middle" class="node-sub">source-proven</text>
  </g>
  <path d="M 960 428 C 960 470 735 475 680 475" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 620 515 L 620 565" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>
  <text x="650" y="548" text-anchor="start" class="label">Current Sheet6: no</text>
  <g filter="url(#shadow)">
    <rect x="385" y="575" width="470" height="76" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
    <text x="620" y="602" text-anchor="middle" class="node-title">Keep object_geometry_hints = 0</text>
    <text x="620" y="624" text-anchor="middle" class="node-sub">No endpoint line rendering; continue Sheet/Text evidence</text>
  </g>
  <rect x="40" y="665" width="1120" height="58" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="60" y="690" class="node-title">PR split</text>
  <text x="150" y="690" class="small">PR1 Contract</text>
  <text x="280" y="690" class="small">PR2 H7CAD Points</text>
  <text x="430" y="690" class="small">PR3 Guardrails</text>
  <text x="575" y="690" class="small">PR4 Field-X Evidence</text>
  <text x="760" y="690" class="small">PR5 GraphicIdentityNearby</text>
  <text x="980" y="690" class="small">No line promotion</text>
  <g transform="translate(60, 720)">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="42" y="4" class="small">contract flow</text>
    <line x1="180" y1="0" x2="214" y2="0" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <text x="222" y="4" class="small">evidence flow</text>
    <line x1="360" y1="0" x2="394" y2="0" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
    <text x="402" y="4" class="small">no-promotion gate</text>
  </g>
</svg>
